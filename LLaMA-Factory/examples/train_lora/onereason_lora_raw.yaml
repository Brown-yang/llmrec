### ============================================================================
### MINIMAL-PROCESSING / RAW-REPLICATION run. See PROGRESS.md.
### Goal: replicate the champion's "官方数据没动 + SFT" as closely as feasible.
### Only unavoidable, content-preserving processing applied to the data:
###   - array-unwrap [{}]->{} and field-rename (system/prompt/response ->
###     system/instruction/output)
###   - KEEP <think> CoT traces, KEEP original /think|/no_think markers
###   - NO drop, NO smart-truncate (all 32,480 kept; LLaMA-Factory front-truncates
###     the ~0.1% over cutoff on its own)
### template qwen3_nothink = plain chatml, treats <think> as literal response text
### (no template magic). Plain LoRA, itemic layers frozen (IRON RULE, see §8).
### ============================================================================

### model
model_name_or_path: /home/lab/wy/LLM_REC/OneReason-0.8B-pretrain-competition
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all
# NO additional_target -> embed_tokens / lm_head stay frozen

### dataset
dataset: onerec_sft_raw    # official 32,480, CoT kept, markers kept, NOT truncated
template: qwen3_nothink
cutoff_len: 8192           # keeps 99.9% of samples fully intact; LF truncates 40 over-length
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/onereason-0.8b/lora/raw
logging_steps: 10
save_steps: 500
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
val_size: 0.02
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 500
